name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build src/Api/Api.csproj -c Release

      - name: Test Application
        run: dotnet test tests/Application.Tests/Application.Tests.csproj -c Release

      - name: Test Domain
        run: dotnet test tests/Domain.Tests/Domain.Tests.csproj -c Release

  docker:
    name: Docker Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose File
        run: docker compose config

      - name: Build API Image
        run: docker build -f Dockerfile .

      - name: Build Migration Image
        run: docker build -f Migration.Dockerfile .
