name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker info
        run: docker version

      - name: Deploy with Compose
        run: docker compose up -d --build --remove-orphans
